name: Check ioBroker Copilot Template Version

on:
  schedule:
    - cron: '23 3 * * 0'
  workflow_dispatch:

jobs:
  check-template:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine current and latest template versions
        id: version-check
        run: |
          set -euo pipefail

          if [[ -f ".github/copilot-instructions.md" ]]; then
            CURRENT_VERSION=$(awk '/Version:|Template Version:/ {match($0, /([0-9]+(\.[0-9]+)*)/, arr); if (arr[1] != "") print arr[1]}' .github/copilot-instructions.md | head -1)
            CURRENT_VERSION=${CURRENT_VERSION:-unknown}
          else
            CURRENT_VERSION=none
          fi

          LATEST_VERSION=$(curl -fsSL "https://raw.githubusercontent.com/DrozmotiX/ioBroker-Copilot-Instructions/main/config/metadata.json" | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
          LATEST_VERSION=${LATEST_VERSION:-unknown}

          UPDATE_NEEDED=false
          if [[ "$CURRENT_VERSION" == "none" || "$CURRENT_VERSION" == "unknown" || "$LATEST_VERSION" == "unknown" || "$CURRENT_VERSION" != "$LATEST_VERSION" ]]; then
            UPDATE_NEEDED=true
          fi

          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest-version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "update-needed=$UPDATE_NEEDED" >> "$GITHUB_OUTPUT"

          echo "Current version: $CURRENT_VERSION"
          echo "Latest version:  $LATEST_VERSION"
          echo "Update needed:   $UPDATE_NEEDED"

      - name: Create update issue when newer template exists
        if: steps.version-check.outputs.update-needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const currentVersion = '${{ steps.version-check.outputs.current-version }}';
            const latestVersion = '${{ steps.version-check.outputs.latest-version }}';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) =>
              issue.title.includes('Setup ioBroker GitHub Copilot Instructions') ||
              issue.title.includes('Update ioBroker Copilot Instructions Template')
            );

            if (existing) {
              core.info(`Existing template issue found: #${existing.number}`);
              return;
            }

            const setupNeeded = currentVersion === 'none';
            const title = setupNeeded
              ? '🤖 Setup ioBroker GitHub Copilot Instructions'
              : '🤖 Update ioBroker Copilot Instructions Template';

            const body = setupNeeded
              ? `# 🤖 ioBroker Copilot Instructions Setup\n\n` +
                `This repository has no .github/copilot-instructions.md yet.\n\n` +
                `## Task\n` +
                `1. Add .github/copilot-instructions.md from the ioBroker template source.\n` +
                `2. Store template version in that file (not in package.json).\n` +
                `3. Keep [CUSTOMIZE] sections for repository-specific content.\n` +
                `4. Keep project specifics for this adapter: dual HTTP/HTTPS listeners, per-host protocol redirects, certificate fail-closed behavior, and translation sync rules.\n\n` +
                `Template source: https://raw.githubusercontent.com/DrozmotiX/ioBroker-Copilot-Instructions/main/template.md\n` +
                `Metadata source: https://raw.githubusercontent.com/DrozmotiX/ioBroker-Copilot-Instructions/main/config/metadata.json\n` +
                `Latest template version: ${latestVersion}`
              : `# 🤖 ioBroker Copilot Instructions Update Available\n\n` +
                `- Current version: ${currentVersion}\n` +
                `- Latest version: ${latestVersion}\n\n` +
                `## Update task\n` +
                `1. Merge latest template guidance into .github/copilot-instructions.md.\n` +
                `2. Preserve all [CUSTOMIZE] sections exactly.\n` +
                `3. Keep project-specific guidance (proxy host routing, cert handling, transient error logging, i18n sync) and remove duplicate standard text.\n` +
                `4. Update version and template metadata references.\n` +
                `5. Show a short summary of changes before applying update.\n\n` +
                `Template source: https://raw.githubusercontent.com/DrozmotiX/ioBroker-Copilot-Instructions/main/template.md\n` +
                `Metadata source: https://raw.githubusercontent.com/DrozmotiX/ioBroker-Copilot-Instructions/main/config/metadata.json`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });